name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Lint — fast, no dependencies beyond ruff
  # ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  # ──────────────────────────────────────────────────────────────────
  # Test — build Cython extension and run pytest
  # ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies and build Cython extension
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools Cython numpy
          python setup.py build_ext --inplace
          python -m pip install -e ".[dev,g2p]"

      - name: Verify Cython extension loaded
        run: |
          python -c "from phone_similarity._dispatch import HAS_CYTHON; assert HAS_CYTHON, 'Cython extension failed to load'"

      - name: Run tests
        run: python -m pytest tests/ -x -q --junitxml=junit/results-${{ matrix.python-version }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: junit/results-${{ matrix.python-version }}.xml

  # ──────────────────────────────────────────────────────────────────
  # Build — sdist + multi-platform wheels via cibuildwheel
  # ──────────────────────────────────────────────────────────────────
  build-sdist:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Build for CPython 3.9–3.13
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          # Skip 32-bit and musl builds to keep CI fast
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          # Install build deps before each wheel build
          CIBW_BEFORE_BUILD: "pip install Cython numpy"
          # Smoke-test: import the package and verify Cython loaded
          CIBW_TEST_COMMAND: >-
            python -c "from phone_similarity._dispatch import HAS_CYTHON; assert HAS_CYTHON"
          CIBW_TEST_REQUIRES: "bitarray langcodes[data] numpy panphon"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ──────────────────────────────────────────────────────────────────
  # Publish — upload to PyPI on tagged releases
  # ──────────────────────────────────────────────────────────────────
  publish:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/phone-similarity
    permissions:
      id-token: write  # trusted publishing (no API token needed)
    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
