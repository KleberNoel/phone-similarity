name: CI

on:
  push:
    branches: [main, master, "dev/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          allow-prereleases: true

      # macOS: libomp must be present before setup.py runs so the Cython
      # extension can link OpenMP (prange).  Linux and Windows ship OpenMP
      # with their default compiler toolchain.
      - name: Install libomp (macOS only)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Install dependencies and build Cython extension
        env:
          # Point the macOS compiler at Homebrew's libomp.
          # On Linux/Windows these variables are empty and harmless.
          CFLAGS: ${{ runner.os == 'macOS' && '-I/opt/homebrew/opt/libomp/include' || '' }}
          LDFLAGS: ${{ runner.os == 'macOS' && '-L/opt/homebrew/opt/libomp/lib' || '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools Cython numpy
          python setup.py build_ext --inplace
          python -m pip install -e ".[dev,g2p]"

      - name: Verify Cython extension loaded
        run: |
          python -c "from phone_similarity._dispatch import HAS_CYTHON; assert HAS_CYTHON, 'Cython extension failed to load'"

      - name: Run tests
        run: python -m pytest tests/ -x -q --junitxml=junit/results-${{ matrix.os }}-${{ matrix.python-version }}.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
          path: junit/results-${{ matrix.os }}-${{ matrix.python-version }}.xml

  build-sdist:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  build-wheels:
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          # Build for CPython 3.10-3.14
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          # Skip 32-bit and musl builds to keep CI fast
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          # Install build deps before each wheel build
          CIBW_BEFORE_BUILD: "pip install Cython numpy"
          # macOS: install libomp so OpenMP prange is available in wheels
          CIBW_BEFORE_BUILD_MACOS: "brew install libomp && pip install Cython numpy"
          CIBW_ENVIRONMENT_MACOS: >-
            CFLAGS="-I$(brew --prefix libomp)/include"
            LDFLAGS="-L$(brew --prefix libomp)/lib"
            MACOSX_DEPLOYMENT_TARGET="14.0"
          # Smoke-test: import the Cython extension only (full deps tested in test job)
          CIBW_TEST_COMMAND: >-
            python -c "import phone_similarity._core"
          CIBW_TEST_REQUIRES: "numpy"
          # Skip wheel test on linux — panphon deps fail to install in manylinux container
          CIBW_TEST_SKIP: "*-manylinux_*"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: dist-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/phone-similarity
    permissions:
      id-token: write  # trusted publishing (no API token needed)
    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
