apiVersion: batch/v1
kind: Job
metadata:
  name: random-hash
spec:
  completions: 5  # FIXED: must be Job level
  template:
    spec: # Pods go here
      containers:
      - image: alpine:3.17.3
        name: random-hash
        resources: {}
        command: ["/bin/sh", "-c", "$RANDOM | base64 | head -c 20"]
      restartPolicy: OnFailure
status: {}
